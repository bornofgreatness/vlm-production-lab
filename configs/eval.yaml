model_id: "Qwen/Qwen2-VL-2B-Instruct"
adapter_path: "outputs/lora-sft"
max_eval_samples: 64
batch_size: 1
max_new_tokens: 32
seed: 42

# Benchmarks to run (subset sizes keep Colab/single GPU feasible)
benchmarks:
  - name: scienceqa
    dataset: "lmms-lab/ScienceQA"
    config: "ScienceQA-FULL"
    split: "test"
    max_samples: 64
  - name: textvqa
    dataset: "textvqa"
    split: "validation"
    max_samples: 64

# Hallucination probe: questions where image does NOT support the gold answer
hallucination_probe_samples: 32
