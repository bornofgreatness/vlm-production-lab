# LoRA supervised fine-tuning for a small vision-language model
model_id: "Qwen/Qwen2-VL-2B-Instruct"
output_dir: "outputs/lora-sft"

# Data
dataset_name: "lmms-lab/ScienceQA"
dataset_config: "ScienceQA-FULL"
max_train_samples: 512
max_eval_samples: 128
val_ratio: 0.1
seed: 42

# LoRA
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj

# Training
num_train_epochs: 1
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 2.0e-4
warmup_ratio: 0.03
max_length: 512
logging_steps: 10
save_steps: 100
eval_steps: 100
bf16: true
gradient_checkpointing: true

# Quantized base (4-bit) for single-GPU friendly training
load_in_4bit: true
